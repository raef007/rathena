###########################################################################
# Item Cash Database
###########################################################################
#
# Item Cash Settings
#
###########################################################################
# - Tab                     Cash shop tab. Available tabs are New, Hot, Limited, Rental, Permanent, Scrolls, Consumables, Other, Sale.
#   Items:                  List of possible items.
#     - Item                Item name.
#       Price               Item cost in cash points (#CASHPOINTS).
#       Duration            Optional rental duration in seconds. If set, item is granted as a rental that expires after this time. (e.g. 2592000 = 30 days)
###########################################################################

Header:
  Type: ITEM_CASH_DB
  Version: 1

Body:
  # ============================================================
  # NEW tab – flagship custom items
  # ============================================================
  - Tab: New
    Items:
      - Item: VIP_Pass_30d
        Price: 500

  # ============================================================
  # HOT tab – popular EXP / drop boosts
  # ============================================================
  - Tab: Hot
    Items:
      - Item: Battle_Manual
        Price: 50
      - Item: Comp_Battle_Manual
        Price: 40
      - Item: HE_Battle_Manual
        Price: 100
      - Item: Bubble_Gum
        Price: 50
      - Item: HE_Bubble_Gum
        Price: 100
      - Item: Job_Manual25
        Price: 50
      - Item: Comp_Job_Manual50
        Price: 40
      - Item: Job_Manual50
        Price: 100

  # ============================================================
  # CONSUMABLES tab – stat food buffs (+10 all stats, 30 min)
  # ============================================================
  - Tab: Consumables
    Items:
      - Item: Str_Dish10_M
        Price: 20
      - Item: Agi_Dish10_M
        Price: 20
      - Item: Int_Dish10_M
        Price: 20
      - Item: Dex_Dish10_M
        Price: 20
      - Item: Luk_Dish10_M
        Price: 20
      - Item: Vit_Dish10_M
        Price: 20

  # ============================================================
  # PERMANENT tab – VIP passes
  # ============================================================
  - Tab: Permanent
    Items:
      - Item: VIP_Pass_30d
        Price: 500

  # ============================================================
  # RENTAL tab – time-limited automation items (30 days)
  # ============================================================
  - Tab: Rental
    Items:
      - Item: Auto_Battle_Pass
        Price: 200
        Duration: 2592000
      - Item: Auto_Support_Capsule
        Price: 150
        Duration: 2592000

Footer:
  Imports:
    - Path: db/import/item_cash.yml
