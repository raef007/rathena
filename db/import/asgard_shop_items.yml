  # -----------------------------------------------------------------------
  # 50031 - Refine Protection Scroll
  # Protects equipment from breaking/downgrading on one failed refine.
  # -----------------------------------------------------------------------
  - Id: 50031
    AegisName: AC_Refine_Protection
    Name: Refine Protection Scroll
    Type: Usable
    Buy: 0
    Sell: 0
    Weight: 10
    Trade:
      NoDrop: true
      NoTrade: true
      NoSell: true
      NoCart: true
      NoGuildStorage: true
      NoMail: true
      NoAuction: true
    Script: |
      bonus_script "bonus bNoBreakWeapon,1; bonus bNoBreakArmor,1;", 3600000, 0, 0, EFST_NOEQUIPWEAPON;
      specialeffect2 EF_MAPPILLAR;
      dispbottom "A protective aura surrounds your gear for 1 hour. Your equipment will not break or downgrade on the next failed refine!";

