# Asgard City - Custom Shop Items
# IDs 50031, 50040-50041 are new custom items.
# Items 18740, 20571, 20602, 20988, 480056, 480069, 480408 are overrides
# of existing official items with added effects.

Header:
  Type: ITEM_DB
  Version: 3

Body:
  # -----------------------------------------------------------------------
  # 50031 - Refine Protection Scroll
  # Protects equipment from breaking/downgrading for 1 hour.
  # -----------------------------------------------------------------------
  - Id: 50031
    AegisName: AC_Refine_Protection
    Name: Refine Protection Scroll
    Type: Usable
    Buy: 0
    Sell: 0
    Weight: 10
    Trade:
      NoDrop: true
      NoTrade: true
      NoSell: true
      NoCart: true
      NoGuildStorage: true
      NoMail: true
      NoAuction: true
    Script: |
      bonus_script "bonus bNoBreakWeapon,1; bonus bNoBreakArmor,1;", 3600000, 0, 0, EFST_NOEQUIPWEAPON;
      specialeffect2 EF_MAPPILLAR;
      dispbottom "A protective aura surrounds your gear for 1 hour. Your equipment will not break or downgrade on the next failed refine!";

  # -----------------------------------------------------------------------
  # 18740 - Super Saiyan Hair (override C_Hair_Of_The_Strong)
  # Non-Monk: gain spirit spheres on melee + grants Critical Explosion skill
  # Monk/Champ: +20 crit while in Critical Explosion state
  # Both: Adrenaline Rush Lv1 when HP < 40% on melee
  # -----------------------------------------------------------------------
  - Id: 18740
    AegisName: C_Hair_Of_The_Strong
    Name: Super Saiyan Hair
    Type: Armor
    Buy: 20
    Locations:
      Costume_Head_Top: true
    ArmorLevel: 1
    View: 879
    Script: |
      if (BaseJob != Job_Monk) {
        bonus3 bAutoSpell,"MO_CALLSPIRITS",5,50;
        skill "MO_EXPLOSIONSPIRITS",5;
      }
      autobonus3 "{ bonus bCritical,20; }",1000,300000,"MO_EXPLOSIONSPIRITS";
      autobonus "{ bonus bAspd,7; }",30,30000,BF_WEAPON,"{ dispbottom \"Adrenaline Rush activated!\",0x00FF00; }";

