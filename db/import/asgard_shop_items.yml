  # -----------------------------------------------------------------------
  # 50029 - Adventurer's Bag
  # One-time per character gift from Tiffy.
  # Scaling bonuses by player base level.
  # -----------------------------------------------------------------------
  - Id: 50029
    AegisName: AC_Adventurers_Bag
    Name: Adventurer's Bag
    Type: Armor
    Buy: 0
    Sell: 0
    Weight: 10
    Locations:
      Costume_Garment: true
    ArmorLevel: 1
    View: 107
    Trade:
      NoDrop: true
      NoTrade: true
      NoSell: true
      NoCart: true
      NoGuildStorage: true
      NoMail: true
      NoAuction: true
    EquipScript: |
      if (BaseLevel >= 10)  { bonus bExpAddRate, 20; bonus bJobExpAddRate, 20; }
      if (BaseLevel >= 20)  { bonus bMaxHP, 500; bonus bAddMaxWeight, 300; }
      if (BaseLevel >= 30)  { bonus bMaxSP, 100; bonus bAddMaxWeight, 300; }
      if (BaseLevel >= 40)  { bonus bDropAddRate, 5; }
      if (BaseLevel >= 50)  { bonus bAspdRate, 1; }
      if (BaseLevel >= 60)  { bonus bAllStats, 1; }
      if (BaseLevel >= 70)  { bonus bAtk, 5; bonus bMatk, 5; }
      if (BaseLevel >= 80)  { bonus bAllStats, 4; }
      if (BaseLevel >= 90)  {
        bonus bExpAddRate, -20; bonus bJobExpAddRate, -20;
        bonus bMaxHP, -500; bonus bAddMaxWeight, -300;
        bonus bMaxSP, -100; bonus bAddMaxWeight, -300;
        bonus bDropAddRate, -5;
        bonus bAspdRate, -1;
        bonus bAllStats, -1;
        bonus bAtk, -5; bonus bMatk, -5;
        bonus bAllStats, -4;
        bonus bExpAddRate, 30; bonus bJobExpAddRate, 30;
        bonus bDropAddRate, 10;
      }

