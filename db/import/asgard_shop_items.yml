  # -----------------------------------------------------------------------
  # 50022 - Super Saiyan Hair
  # Based on item 18740 (C_Hair_Of_The_Strong), same sprite/view (879).
  # Effect: melee attack has 5% chance to trigger 10s power burst
  #   - 100% crit, max ASPD, double damage for 10s
  #   - After 10s: silence + double damage taken for 20s
  # -----------------------------------------------------------------------
  - Id: 50022
    AegisName: AC_Super_Saiyan_Hair
    Name: Super Saiyan Hair
    Type: Armor
    Buy: 0
    Sell: 0
    Weight: 10
    Locations:
      Costume_Head_Top: true
    ArmorLevel: 1
    View: 879
    Trade:
      NoDrop: true
      NoTrade: true
      NoSell: true
      NoCart: true
      NoGuildStorage: true
      NoMail: true
      NoAuction: true
    EquipScript: |
      // 5% chance on melee attack: 100% crit + max ASPD + double ATK for 10s, then silence + double damage taken for 20s
      autobonus "{ bonus bCritical,100; bonus bAspd,200; bonus bAtkRate,100; }",
        500, 10000, BF_WEAPON,
        "{ sc_start SC_SILENCE,20000,0; bonus2 bAddDamageClass,RC_All,100; }";

